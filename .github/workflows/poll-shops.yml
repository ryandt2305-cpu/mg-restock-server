name: Poll Shops

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: poll-shops
  cancel-in-progress: true

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Poll live shops
        run: npm run poll

      - name: Commit data
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "gemini-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/*.json
            git commit -m "Update shop history"
            git push
          else
            echo "No changes"
          fi
